<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BetTracker</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
box-sizing:border-box;
}

button{
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

.card{
background:#eee;
padding:15px;
text-align:center;
border-radius:8px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.win{
color:green;
font-weight:bold;
}

.loss{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>⚽ BetTracker</h1>

<input type="date" id="date">

<input type="number" id="stake" placeholder="Stake Amount">

<input type="number" step="0.01" id="odds" placeholder="Odds">

<select id="result">
<option value="Win">Win</option>
<option value="Loss">Loss</option>
</select>

<button onclick="addBet()">Add Bet</button>

<div class="stats">

<div class="card">
<h3 id="bets">0</h3>
<p>Total Bets</p>
</div>

<div class="card">
<h3 id="staked">₦0</h3>
<p>Total Stake</p>
</div>

<div class="card">
<h3 id="profit">₦0</h3>
<p>Total Profit</p>
</div>

<div class="card">
<h3 id="winrate">0%</h3>
<p>Win Rate</p>
</div>

</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Stake</th>
<th>Odds</th>
<th>Result</th>
<th>Profit</th>
</tr>
</thead>

<tbody id="betTable"></tbody>

</table>

</div>

<script>

let bets = JSON.parse(localStorage.getItem("bets")) || [];

function saveData(){
localStorage.setItem("bets", JSON.stringify(bets));
}

function addBet(){

let date = document.getElementById("date").value;
let stake = parseFloat(document.getElementById("stake").value);
let odds = parseFloat(document.getElementById("odds").value);
let result = document.getElementById("result").value;

if(!date || !stake || !odds){
alert("Fill all fields");
return;
}

let profit =
result === "Win"
? (stake * odds) - stake
: -stake;

bets.push({
date,
stake,
odds,
result,
profit
});

saveData();
render();
}

function render(){

let table = document.getElementById("betTable");

table.innerHTML="";

let totalStake=0;
let totalProfit=0;
let wins=0;

bets.forEach(bet=>{

totalStake += bet.stake;
totalProfit += bet.profit;

if(bet.result==="Win") wins++;

table.innerHTML += `
<tr>
<td>${bet.date}</td>
<td>₦${bet.stake}</td>
<td>${bet.odds}</td>
<td class="${bet.result==='Win'?'win':'loss'}">
${bet.result}
</td>
<td>₦${bet.profit.toFixed(2)}</td>
</tr>
`;
});

let winRate =
bets.length
? ((wins/bets.length)*100).toFixed(1)
: 0;

document.getElementById("bets").innerText =
bets.length;

document.getElementById("staked").innerText =
"₦" + totalStake.toLocaleString();

document.getElementById("profit").innerText =
"₦" + totalProfit.toFixed(2);

document.getElementById("winrate").innerText =
winRate + "%";
}

render();

</script>

</body>
</html>
